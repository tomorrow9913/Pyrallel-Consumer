version: 2
multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "supply-chain"

updates:
  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "develop"
    patterns:
      - "*"
    multi-ecosystem-group: "weekly-dependencies"
    labels:
      - "dependencies"
      - "supply-chain"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    patterns:
      - "*"
    multi-ecosystem-group: "weekly-dependencies"
    labels:
      - "dependencies"
      - "supply-chain"
