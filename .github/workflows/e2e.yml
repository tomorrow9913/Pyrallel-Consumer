name: e2e

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/e2e.compose.yml"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, ready_for_review, synchronize]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/e2e.compose.yml"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: ordering-kafka-backed
            pytest_args: >-
              tests/e2e/test_ordering.py
          - name: recovery-rebalance-restart
            pytest_args: >-
              tests/e2e/test_process_recovery.py::test_process_rebalance_keeps_commit_safe_while_work_is_inflight
              tests/e2e/test_process_recovery.py::test_process_restart_preserves_offset_continuity
          - name: recovery-retry-dlq
            pytest_args: >-
              tests/e2e/test_process_recovery.py::test_process_retry_path_commits_only_after_success
              tests/e2e/test_process_recovery.py::test_process_dlq_path_commits_after_retry_exhaustion
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Start Kafka
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml up -d kafka-1
      - name: Sync locked dependencies
        run: |
          uv sync --frozen --group dev
      - name: Wait for Kafka readiness
        run: |
          uv run python - <<'PY'
          import time

          from confluent_kafka.admin import AdminClient

          client = AdminClient({"bootstrap.servers": "127.0.0.1:9092"})
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  metadata = client.list_topics(timeout=5)
                  if getattr(metadata, "brokers", None):
                      raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit(
              "Kafka did not become metadata-ready on localhost:9092 within 60 seconds"
          )
          PY
      - name: Run Kafka-backed gate
        env:
          PYRALLEL_E2E_REQUIRE_BROKER: "1"
        run: |
          mkdir -p .artifacts
          uv run pytest ${{ matrix.suite.pytest_args }} -q --maxfail=1 -ra --junitxml=.artifacts/e2e-junit.xml
      - name: Upload broker-backed E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit-${{ matrix.suite.name }}-${{ github.run_id }}
          path: .artifacts/e2e-junit.xml
      - name: Stop Kafka
        if: always()
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml down
