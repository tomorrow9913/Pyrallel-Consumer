name: e2e

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/e2e.compose.yml"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, ready_for_review, synchronize]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/e2e.compose.yml"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: ordering-kafka-backed
            pytest_args: >-
              tests/e2e/test_ordering.py
          - name: recovery-rebalance-restart
            pytest_args: >-
              tests/e2e/test_process_recovery.py::test_process_rebalance_keeps_commit_safe_while_work_is_inflight
              tests/e2e/test_process_recovery.py::test_process_restart_preserves_offset_continuity
          - name: recovery-retry-dlq
            pytest_args: >-
              tests/e2e/test_process_recovery.py::test_process_retry_path_commits_only_after_success
              tests/e2e/test_process_recovery.py::test_process_dlq_path_commits_after_retry_exhaustion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Start Kafka
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml up -d kafka-1
      - name: Wait for Kafka readiness
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 9092), timeout=1):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit("Kafka did not become ready on localhost:9092 within 60 seconds")
          PY
      - name: Sync locked dependencies
        run: |
          uv sync --frozen --group dev
      - name: Run Kafka-backed gate
        run: |
          uv run pytest ${{ matrix.suite.pytest_args }} -q --maxfail=1 -ra
      - name: Stop Kafka
        if: always()
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml down
