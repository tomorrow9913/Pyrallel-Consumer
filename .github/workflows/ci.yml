name: ci

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "README.ko.md"
      - ".github/compatibility-matrix.json"
      - ".github/e2e.compose.yml"
      - ".github/workflows/compatibility-matrix.yml"
      - ".github/workflows/publish-pypi.yml"
      - ".github/workflows/release-verify.yml"
      - ".github/dependabot.yml"
      - "docs/operations/**"
      - "scripts/compatibility_matrix.py"
      - "tests/unit/test_compatibility_matrix_assets.py"
      - "tests/unit/test_supply_chain_assets.py"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "README.ko.md"
      - ".github/compatibility-matrix.json"
      - ".github/e2e.compose.yml"
      - ".github/workflows/compatibility-matrix.yml"
      - ".github/workflows/publish-pypi.yml"
      - ".github/workflows/release-verify.yml"
      - ".github/dependabot.yml"
      - "docs/operations/**"
      - "scripts/compatibility_matrix.py"
      - "tests/unit/test_compatibility_matrix_assets.py"
      - "tests/unit/test_supply_chain_assets.py"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync locked dependencies
        run: |
          uv sync --frozen --group dev
      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          set +e
          timeout --signal=TERM --kill-after=30s 5m \
            uv run python - <<'PY'
            import faulthandler
            import sys
            import pytest

            faulthandler.enable(all_threads=True)
            faulthandler.dump_traceback_later(30, repeat=True, file=sys.stderr)
            try:
                raise SystemExit(
                    pytest.main(
                        [
                            "tests/unit",
                            "-q",
                            "--maxfail=1",
                            "--ignore=tests/unit/benchmarks",
                        ]
                    )
                )
            finally:
                faulthandler.cancel_dump_traceback_later()
            PY
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Dump processes after pytest
        if: always()
        run: |
          ps -ef
          pgrep -af python || true
          pgrep -af pytest || true
      - name: Fail if pytest failed or timed out
        if: ${{ steps.unit_tests.outputs.exit_code != '0' }}
        run: |
          echo "pytest exited with code ${{ steps.unit_tests.outputs.exit_code }}"
          exit 1
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync locked dependencies
        run: |
          uv sync --frozen --group dev
      - name: Run integration tests
        id: integration_tests
        continue-on-error: true
        run: |
          set +e
          timeout --signal=TERM --kill-after=30s 5m \
            uv run python - <<'PY'
            import faulthandler
            import sys
            import pytest

            faulthandler.enable(all_threads=True)
            faulthandler.dump_traceback_later(30, repeat=True, file=sys.stderr)
            try:
                raise SystemExit(
                    pytest.main(
                        [
                            "tests/integration",
                            "-q",
                            "--maxfail=1",
                            "-W",
                            "error::RuntimeWarning",
                        ]
                    )
                )
            finally:
                faulthandler.cancel_dump_traceback_later()
            PY
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Dump processes after pytest
        if: always()
        run: |
          ps -ef
          pgrep -af python || true
          pgrep -af pytest || true
      - name: Fail if pytest failed or timed out
        if: ${{ steps.integration_tests.outputs.exit_code != '0' }}
        run: |
          echo "pytest exited with code ${{ steps.integration_tests.outputs.exit_code }}"
          exit 1
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync locked dependencies
        run: |
          uv sync --frozen --group dev
      - name: Export locked requirements for SCA
        run: |
          mkdir -p .artifacts
          uv export --frozen --format requirements.txt --all-groups --no-hashes --no-emit-project \
            --output-file .artifacts/locked-requirements.txt
      - name: Run lockfile SCA audit
        run: |
          uv run pip-audit --no-deps --disable-pip -r .artifacts/locked-requirements.txt
      - name: Run Bandit
        run: |
          uv run bandit -q -lll -r pyrallel_consumer
      - name: Run Ruff
        run: |
          uv run ruff check .
      - name: Run mypy
        run: |
          uv run mypy pyrallel_consumer
      - name: Build package
        run: |
          uv build
      - name: Check distribution metadata
        run: |
          uv run twine check dist/pyrallel_consumer-*
