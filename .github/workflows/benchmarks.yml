name: benchmarks

on:
  push:
    branches: [main, develop]
    paths:
      - "benchmarks/**"
      - "pyrallel_consumer/**/*.py"
      - "tests/unit/benchmarks/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/e2e.compose.yml"
      - ".github/workflows/benchmarks.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "benchmarks/**"
      - "pyrallel_consumer/**/*.py"
      - "tests/unit/benchmarks/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync benchmark dependencies
        run: |
          uv sync --frozen --group dev
      - name: Run benchmark and TUI unit tests
        run: |
          uv run pytest tests/unit/benchmarks -q

  benchmark-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        workload: [sleep, io, cpu]
        ordering: [key_hash, partition]
        strict_completion_monitor: [on, off]
    env:
      WORKLOAD: ${{ matrix.workload }}
      ORDERING: ${{ matrix.ordering }}
      STRICT_COMPLETION_MONITOR: ${{ matrix.strict_completion_monitor }}
      BENCH_NUM_MESSAGES: "3000"
      BENCH_NUM_KEYS: "300"
      BENCH_NUM_PARTITIONS: "4"
      BENCH_TIMEOUT_SEC: "240"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync benchmark dependencies
        run: |
          uv sync --frozen --group dev
      - name: Start Kafka
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml up -d kafka-1
      - name: Wait for Kafka readiness
        run: |
          uv run python - <<'PY'
          import time

          from confluent_kafka.admin import AdminClient

          client = AdminClient({"bootstrap.servers": "127.0.0.1:9092"})
          deadline = time.time() + 90
          while time.time() < deadline:
              try:
                  metadata = client.list_topics(timeout=5)
                  if getattr(metadata, "brokers", None):
                      raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit(
              "Kafka did not become metadata-ready on localhost:9092 within 90 seconds"
          )
          PY
      - name: Prepare benchmark artifact paths
        run: |
          set -euo pipefail
          RUN_KEY="${WORKLOAD}-${ORDERING}-${STRICT_COMPLETION_MONITOR}"
          BASE_DIR=".artifacts/benchmark-matrix/${RUN_KEY}"
          mkdir -p "${BASE_DIR}"
          echo "BENCH_RUN_KEY=${RUN_KEY}" >> "$GITHUB_ENV"
          echo "BENCH_ARTIFACT_DIR=${BASE_DIR}" >> "$GITHUB_ENV"
          echo "BENCH_RESULT_JSON=${BASE_DIR}/benchmark.json" >> "$GITHUB_ENV"
          echo "BENCH_LOG=${BASE_DIR}/benchmark.log" >> "$GITHUB_ENV"
      - name: Run benchmark matrix cell
        run: |
          set -euo pipefail
          CLI_ARGS=(
            "--workloads" "${WORKLOAD}"
            "--order" "${ORDERING}"
            "--strict-completion-monitor" "${STRICT_COMPLETION_MONITOR}"
            "--num-messages" "${BENCH_NUM_MESSAGES}"
            "--num-keys" "${BENCH_NUM_KEYS}"
            "--num-partitions" "${BENCH_NUM_PARTITIONS}"
            "--timeout-sec" "${BENCH_TIMEOUT_SEC}"
            "--topic-prefix" "ci-bench-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${WORKLOAD}-${ORDERING}-${STRICT_COMPLETION_MONITOR}"
            "--json-output" "${BENCH_RESULT_JSON}"
            "--log-level" "WARNING"
          )
          printf '%s\n' "${CLI_ARGS[@]}" > "${BENCH_ARTIFACT_DIR}/cli-args.txt"
          uv run python -m benchmarks.run_parallel_benchmark "${CLI_ARGS[@]}" >"${BENCH_LOG}" 2>&1
      - name: Build artifact metadata and summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ["BENCH_ARTIFACT_DIR"])
          result_path = Path(os.environ["BENCH_RESULT_JSON"])
          cli_args_path = artifact_dir / "cli-args.txt"
          cli_args = cli_args_path.read_text(encoding="utf-8").splitlines() if cli_args_path.exists() else []
          metadata = {
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "job": os.environ.get("GITHUB_JOB"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "sha": os.environ.get("GITHUB_SHA"),
              "ref": os.environ.get("GITHUB_REF"),
              "matrix": {
                  "workload": os.environ.get("WORKLOAD"),
                  "ordering": os.environ.get("ORDERING"),
                  "strict_completion_monitor": os.environ.get("STRICT_COMPLETION_MONITOR"),
              },
              "cli_args": cli_args,
              "result_json_path": str(result_path),
          }
          summary_lines = [
              "# Benchmark Matrix Summary",
              "",
              "| Key | Value |",
              "| --- | ----- |",
              "| workload | %s |" % os.environ.get("WORKLOAD"),
              "| ordering | %s |" % os.environ.get("ORDERING"),
              "| strict_completion_monitor | %s |" % os.environ.get("STRICT_COMPLETION_MONITOR"),
              "| run_id | %s |" % os.environ.get("GITHUB_RUN_ID"),
              "| sha | `%s` |" % os.environ.get("GITHUB_SHA"),
          ]
          if result_path.exists():
              try:
                  payload = json.loads(result_path.read_text(encoding="utf-8"))
                  results = payload.get("results", [])
                  summary_lines.extend(
                      [
                          "",
                          "| mode | throughput_tps | avg_processing_ms | p99_processing_ms |",
                          "| ---- | -------------- | ----------------- | ----------------- |",
                      ]
                  )
                  for item in results:
                      summary_lines.append(
                          "| %s | %.2f | %.3f | %.3f |"
                          % (
                              item.get("run_type", "unknown"),
                              float(item.get("throughput_tps", 0.0)),
                              float(item.get("avg_processing_ms", 0.0)),
                              float(item.get("p99_processing_ms", 0.0)),
                          )
                      )
                  metadata["result_count"] = len(results)
              except Exception as exc:
                  metadata["result_parse_error"] = str(exc)
                  summary_lines.extend(["", "Result JSON parse failed."])
          else:
              summary_lines.extend(["", "Result JSON was not generated."])

          (artifact_dir / "benchmark-metadata.json").write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          summary_text = "\n".join(summary_lines) + "\n"
          (artifact_dir / "benchmark-summary.md").write_text(summary_text, encoding="utf-8")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fp:
              fp.write(summary_text)
          PY
      - name: Upload benchmark matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-matrix-${{ github.run_id }}-${{ matrix.workload }}-${{ matrix.ordering }}-${{ matrix.strict_completion_monitor }}
          path: ${{ env.BENCH_ARTIFACT_DIR }}
      - name: Stop Kafka
        if: always()
        env:
          GF_SECURITY_ADMIN_PASSWORD: local-e2e
        run: |
          docker compose -f .github/e2e.compose.yml down
