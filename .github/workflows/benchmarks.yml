name: benchmarks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "benchmarks/**"
      - "pyrallel_consumer/**/*.py"
      - "tests/unit/benchmarks/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:

jobs:
  benchmark-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync benchmark dependencies
        run: |
          uv sync --frozen --group dev
      - name: Run benchmark and TUI unit tests
        run: |
          uv run pytest tests/unit/benchmarks -q
